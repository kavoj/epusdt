		<script id="app-bootstrap-script">
		"use strict";
		(() => {
			window.__splashStart = Date.now();

			const root = document.documentElement;
			let resolved = "light";
			try {
				const cookieValue = document.cookie
					.split("; ")
					.find((row) => row.startsWith("theme="))
					?.split("=")[1];
				const stored =
					cookieValue === "light" ||
					cookieValue === "dark" ||
					cookieValue === "system"
						? cookieValue
						: "system";
				const prefersDark = window.matchMedia(
					"(prefers-color-scheme: dark)"
				).matches;
				if (stored === "system") {
					resolved = prefersDark ? "dark" : "light";
				} else {
					resolved = stored;
				}
			} catch {
				// cookie access may be blocked in some environments
			}
			root.dataset.mode = resolved;
			root.style.colorScheme = resolved;
		})();
		</script>

			align-items: center;

			height: 100dvh;

			pointer-events: none;
			background: #fff;

		}

		}

		#splash-track {
			width: 9rem;
			height: 0.25rem;
			overflow: hidden;
			background: rgba(0, 0, 0, 0.15);
			border-radius: 9999px;
		}

		#splash-bar {
			display: block;
			width: 1.5rem;
			height: 100%;
			background: #000;
			border-radius: 9999px;
			animation: splash-bar 0.8s ease-in-out infinite alternate;
		}

		@media (prefers-color-scheme: dark) {
			#splash {
				background: #000;
			}

			#splash-track {
				background: rgba(255, 255, 255, 0.15);
			}

			#splash-bar {

			}
		}

		html[data-mode="dark"] #splash {

		}
